name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - run: hayulo check examples/hello.hayulo --json
      - run: hayulo test examples/hello.hayulo --json
      - run: hayulo check examples/todo_api/main.hayulo --json
      - run: hayulo build examples/todo_api/main.hayulo --out /tmp/hayulo-generated --json
